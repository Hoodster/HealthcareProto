version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: DEPENDENCY-UPDATE
    labels: [dependencies, internal]
  # Python pip
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: DEPENDENCY-UPDATE
    labels: [dependencies, internal]

